version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_KRAFT_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,OUTSIDE://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,OUTSIDE://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_KRAFT_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  localstack:
    image: localstack/localstack:3.8.0
    environment:
      - SERVICES=sqs,sns,lambda,events,iam,sts
      - DATA_DIR=/var/lib/localstack
      - LAMBDA_EXECUTOR=local
      - LAMBDA_REMOTE_DOCKER=false
      - LOCALSTACK_HOST=localstack:4566
      - DEBUG=0
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/app
      - KAFKA_BROKERS=kafka:9092
      - LOCALSTACK_URL=http://localstack:4566
      - SQS_ENDPOINT_STRATEGY=path
    volumes:
      - localstack-data:/var/lib/localstack
      - ./infra/localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - ./infra/localstack/lambdas:/etc/localstack/init/ready.d/lambdas
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4566:4566"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  migrate:
    image: postgres:15
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./infra/migrations:/migrations
    command: >
      bash -c "
        for f in /migrations/V*.sql; do
          echo \"Running $$f\";
          psql -h postgres -U postgres -d app -f \"$$f\";
        done;
        psql -h postgres -U postgres -d app -f /migrations/seed.sql;
        echo 'Migrations done'
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: ./services/api-gateway/.env.example
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    env_file: ./services/order-service/.env.example
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    env_file: ./services/inventory-service/.env.example
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    env_file: ./services/payment-service/.env.example
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      localstack:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    env_file: ./services/notification-service/.env.example
    ports:
      - "3004:3004"
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_started
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    env_file: ./services/analytics-service/.env.example
    ports:
      - "3005:3005"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  localstack-data:
